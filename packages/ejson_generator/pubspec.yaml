name: ejson_generator
description: >-
  EJSON serialization.

  BSON is a binary format used to store JSON-like documents efficiently.
  EJSON extends JSON defining how all BSON types should be represented in JSON.

topics:
  - ejson
  - bson
  - json
  - build-runner
  - codegen

version: 0.4.0
repository: https://github.com/realm/realm-dart/ejson/packages/ejson_generator

environment:
  sdk: ^3.6.0

dependencies:
  analyzer: ^8.1.1
  build: '>=3.0.2 <5.0.0'
  ejson_analyzer: ^0.4.1
  source_gen: ^4.2.3

dev_dependencies:
  build_runner: ^2.15.1
  build_test: ^3.5.16
  dart_style: ^3.1.2
  ejson: ^0.4.0
  ejson_annotation: ^0.4.0
  lints: ^5.1.1
  logging: ^1.2.0
  meta: ^1.15.0
  test: ^1.25.9
  pub_semver: ^2.2.0
