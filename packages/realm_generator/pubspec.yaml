name: realm_generator
description: >-
  Generates RealmObject classes from Realm data model classes.
  This package is part of the official Realm Flutter and Realm Dart SDKs.

version: 3.5.0

homepage: https://www.realm.io
repository: https://github.com/realm/realm-dart
issue_tracker: https://github.com/realm/realm-dart/issues

environment:
  sdk: ^3.6.0

dependencies:
  analyzer: ^8.1.1
  build_resolvers: ^3.0.4
  build: '>=3.0.2 <5.0.0'
  dart_style: ^3.1.2
  realm_common: ^3.5.0
  source_gen: ^4.2.3
  source_span: ^1.8.0
  collection: ^1.19.0

dev_dependencies:
  build_runner: ^2.7.2
  build_runner_core: ^9.3.2
  build_test: ^3.3.4
  lints: ^5.1.1
  logging: ^1.2.0
  meta: ^1.15.0
  path: ^1.9.0
  term_glyph: ^1.2.0
  test: ^1.25.9
  pub_semver: ^2.2.0
